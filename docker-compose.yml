name: songkisser

services:
  songkisser:
    # Image is pulled from GHCR. GITHUB_REPOSITORY must be lowercase (e.g.
    # protoser/songkisser). To build locally instead, comment out `image:`
    # and uncomment `build: .`
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    # build: .
    container_name: songkisser
    restart: always
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      # Comma-separated Discord user IDs granted global admin access (optional).
      BOT_ADMINS: ${BOT_ADMINS:-}
      # Store the settings DB on the mounted volume so it survives restarts.
      SONGKISSER_DB: /data/songkisser.db
    volumes:
      - songkisser-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

volumes:
  songkisser-data:
